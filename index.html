<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juggle Lab</title>
    <style>
        * { box-sizing: border-box; }
        :root {
          --drawer-width: 280px;
          --drawer-gap: 10px;
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            display: flex;
            flex-direction: column;
            background: #f5f8fa;
            font-family: Arial, sans-serif;
            color: #0b2135;
        }

        .header { height: 0; background: #e3e8ee; }
        h1 { text-align: center; color: #1976d2; margin: 12px 0; font-size: 28px; font-weight: 700; letter-spacing: 0.5px; }
        .main-content { 
            flex: 1;
            display: flex;
            gap: 0;
            align-items: stretch;
            min-height: 0; 
        }

        .animation-panel { flex: 1; background: #f5f8fa; position: relative; display: flex; align-items: stretch; justify-content: center; padding: 0; min-height: 0; overflow: hidden; }
        .control-panel { width: 13%; background: #e3e8ee; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; align-items: stretch; justify-content: flex-start; overflow: auto; }

        #left-drawer-btn, #right-drawer-btn {
          position: absolute;
          z-index: 40;
          top: 10px;
          border: none;
          border-radius: 8px;
          width: 40px;
          height: 40px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          background: #1976d2;
          color: #fff;
          box-shadow: 0 2px 6px rgba(0,0,0,.25);
          cursor: pointer;
          transition: left .25s ease;
        }
        #left-drawer-btn { left: var(--drawer-gap); }
        #right-drawer-btn { right: 10px; display: none; }

        #threejs-canvas { width: 100%; height: 100%; display: block; background: transparent; box-shadow: 0 2px 12px rgba(0,0,0,.1); }

        .controls { position: absolute; left: 50%; transform: translateX(-50%); bottom: 12px; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 14px; display: flex; gap: 10px; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.15); backdrop-filter: blur(8px); }
        .previous-throw-button, .toggle-pause-button, .next-throw-button { padding: 8px 12px; border: 1px solid #1976d2; border-radius: 6px; background-color: #1976d2; color: #fff; font-size: 14px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
        .previous-throw-button:hover, .toggle-pause-button:hover, .next-throw-button:hover { background-color: #0d47a1; border-color: #0d47a1; box-shadow: 0 2px 8px rgba(25,118,210,.2); }
        .previous-throw-button:active, .toggle-pause-button:active, .next-throw-button:active { box-shadow: 0 1px 3px rgba(25,118,210,.25); }


        #fullscreen-btn, #exit-fullscreen-btn {
          position: absolute;
          right: 6px;
          top: 6px;
          z-index: 1000;
          border: none;
          border-radius: 6px;
          width: 52px;
          height: 52px;
          padding: 0;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          cursor: pointer;
          box-shadow: 0 2px 6px rgba(0,0,0,.25);
          font-weight: 700;
          font-size: 28px;
          line-height: 1;
          transition: all 0.2s ease;
        }
        #fullscreen-btn { background:#1976d2; }
        #fullscreen-btn:hover { background:#0d47a1; }
        #exit-fullscreen-btn { background:#d32f2f; top: 6px; right: 6px; display:none; }
        #exit-fullscreen-btn:hover { background:#b71c1c; }

        .ViewSelector { padding: 8px 12px; border: 1px solid #cfe0f2; border-radius: 6px; background: #fff; font-size: 14px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
        .ViewSelector:hover { border-color: #1976d2; box-shadow: 0 2px 8px rgba(25,118,210,.2); }
        .ViewSelector:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 3px rgba(25,118,210,.15); }

        .control-panel input[type="text"].siteswapinput { width: 100%; padding: 10px 14px; border-radius: 6px; border: 1px solid #cfe0f2; background: #fff; font-size: 14px; transition: all 0.2s ease; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .control-panel input[type="text"].siteswapinput:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 3px rgba(25,118,210,.15); }
        .control-panel .RandomButton, .control-panel #RandomButton { width: 100%; padding: 10px 14px; background-color: #1976d2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s ease; box-shadow: 0 2px 6px rgba(25,118,210,.25); }
        .control-panel .RandomButton:hover { background-color: #0d47a1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(25,118,210,.35); }
        .control-panel .RandomButton:active { transform: translateY(0); box-shadow: 0 1px 3px rgba(25,118,210,.25); }

        .speed-group { width: 100%; display:flex; flex-direction:column; gap:8px; align-items:stretch; }
        .speed-group label { font-size: 13px; color: #0b2135; margin-left:2px; font-weight: bold; }
        .speed-group .label-value-row { display: flex; justify-content: space-between; align-items: center; }
        .speed-slider { width: 100%; -webkit-pappearance: none; height: 6px; border-radius: 6px; background: linear-gradient(90deg,#1976d2,#0d47a1); outline: none; }
        .speed-value { font-size: 13px; color:#0b2135; text-align:right; }

        #speed.speed-slider,
        #randMaxThrow,
        #trailLengthSlider {
          appearance: none;
          -webkit-appearance: none;
          width: 100%;
          height: 8px;
          border-radius: 999px;
          background: linear-gradient(180deg, #f0f5fb, #e1ecf7);
          border: 1px solid #cfe0f2;
          outline: none;
          box-shadow: inset 0 1px 2px rgba(0,0,0,.12);
          accent-color: #1976d2; 
          transition: box-shadow .15s ease, border-color .15s ease;
        }
        #speed.speed-slider:hover,
        #randMaxThrow:hover,
        #trailLengthSlider:hover {
          border-color: #b7cce8;
          box-shadow: inset 0 1px 2px rgba(0,0,0,.12), 0 0 0 3px rgba(25,118,210,.08);
        }
        #speed.speed-slider:focus,
        #randMaxThrow:focus,
        #trailLengthSlider:focus {
          border-color: #1976d2;
          box-shadow: inset 0 1px 2px rgba(0,0,0,.12), 0 0 0 4px rgba(25,118,210,.15);
        }

        #speed.speed-slider::-webkit-slider-runnable-track,
        #randMaxThrow::-webkit-slider-runnable-track,
        #trailLengthSlider::-webkit-slider-runnable-track {
          height: 8px;
          border-radius: 999px;
          background: transparent;
        }
        #speed.speed-slider::-webkit-slider-thumb,
        #randMaxThrow::-webkit-slider-thumb,
        #trailLengthSlider::-webkit-slider-thumb {
          -webkit-appearance: none;
          width: 18px;
          height: 18px;
          border-radius: 50%;
          background: #fff;
          border: 2px solid #1976d2;
          box-shadow: 0 2px 6px rgba(13,71,161,.25);
          margin-top: -5px; 
          transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
        }
        #speed.speed-slider::-webkit-slider-thumb:hover,
        #randMaxThrow::-webkit-slider-thumb:hover,
        #trailLengthSlider::-webkit-slider-thumb:hover {
          transform: scale(1.05);
          border-color: #0d47a1;
        }
        #speed.speed-slider:active::-webkit-slider-thumb,
        #randMaxThrow:active::-webkit-slider-thumb,
        #trailLengthSlider:active::-webkit-slider-thumb {
          transform: scale(0.98);
          box-shadow: 0 1px 4px rgba(13,71,161,.25);
        }

        .speed-value {
          font-variant-numeric: tabular-nums;
          background: #fff;
          border: 1px solid #dfe7f2;
          border-radius: 6px;
          padding: 2px 8px;
          align-self: flex-end;
          box-shadow: 0 1px 0 rgba(0,0,0,.03);
        }

        .rounded-box { width: 100%; background: #fff; border-radius: 8px; padding: 10px; box-sizing: border-box; box-shadow: 0 2px 8px rgba(0,0,0,.08); border: 1px solid #e8eef5; }
        .rounded-box p { margin: 0 0 12px 0; color: #1976d2; font-weight: 600; font-size: 14px; }

        .rounded-box .table-wrap { width: 100%; overflow-x: auto; }
        .rounded-box table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .rounded-box th, .rounded-box td { padding: 2px 1px; text-align: center; font-size: 12px; }
        .rounded-box th { background: #f5f8fa; color: #0b2135; font-weight: 600; border-bottom: 2px solid #e8eef5; }
        .rounded-box input[type="color"] { 
            width: 30px; 
            height: 20px; 
            border: none; 
            padding: 0; 
            border-radius: 3px; 
            cursor: pointer; 
        }
        .rounded-box input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .rounded-box input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
        .rounded-box input[type="color"]::-moz-color-swatch { border: none; border-radius: 3px; }
        .rounded-box input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #1976d2; }

        .prop-row { margin-top: 8px; display:flex; flex-direction:column; gap:6px; }
        .prop-row label { font-size: 13px; color:#0b2135; font-weight: 500; }
        .prop-select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #cfe0f2; background: #fff; font-size: 14px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .prop-select:hover { border-color: #1976d2; }
        .prop-select:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 3px rgba(25,118,210,.15); }

        .ResetBtn, .SaveBtn { width: 100%; padding: 10px 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s ease; }
        .ResetBtn { background-color: #e53935; color: #fff; box-shadow: 0 2px 6px rgba(229,57,53,.25); }
        .ResetBtn:hover { background-color: #b71c1c; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(229,57,53,.35); }
        .ResetBtn:active { transform: translateY(0); box-shadow: 0 1px 3px rgba(229,57,53,.25); }
        .SaveBtn { background-color: #1976d2; color: #fff; box-shadow: 0 2px 6px rgba(25,118,210,.25); }
        .SaveBtn:hover { background-color: #0d47a1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(25,118,210,.35); }
        .SaveBtn:active { transform: translateY(0); box-shadow: 0 1px 3px rgba(25,118,210,.25); }

        .siteswap-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .siteswap-group .row { display: flex; gap: 8px; width: 100%; }
        .siteswap-group .row > * { flex: 1; }

        .siteswap-group #RandomButton + div {
          display: grid !important;
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
          column-gap: 8px;
          row-gap: 6px;
          width: 100% !important;
          margin: 6px 0 0 0 !important;
          align-items: center;
          font-size: 12px;
        }

        .siteswap-group #RandomButton + div > label {
          grid-column: 1;
          grid-row: 1;
          font-weight: 600;
          color: #0b2135;
          margin: 0;
        }

        #randMaxThrowValue {
          grid-column: 2;
          grid-row: 1;
          font-variant-numeric: tabular-nums;
          background: #fff;
          border: 1px solid #dfe7f2;
          border-radius: 6px;
          padding: 2px 8px;
        }

        #randMaxThrow {
          grid-column: 1 / span 2;
          grid-row: 2;
          width: 100% !important;  
        }


    </style>
</head>
<body>
    <div class="header"></div>

    <div class="main-content">
        <div class="animation-panel">
            <canvas id="threejs-canvas"></canvas>
            <button id="fullscreen-btn" title="Toggle Fullscreen">⤢</button>
            <button id="exit-fullscreen-btn" title="Exit Fullscreen">⤡</button>
            <div class="controls">
                <button class="previous-throw-button AnimationButtons">⏮️</button>
                <button class="toggle-pause-button AnimationButtons">⏸️</button>
                <button class="next-throw-button AnimationButtons">⏭️</button>
                <select class="ViewSelector" style="width:auto; margin:0;">
                    <option>Front View</option>
                    <option>Side View</option>
                    <option>POV</option>
                </select>
                <select id="characterSelector" style="padding:8px 12px;border-radius:6px;background:#666;color:#fff;border:1px solid #555;font-size:14px;cursor:pointer;transition:all 0.2s ease;box-shadow:0 2px 6px rgba(0,0,0,.3);">
                    <option value="Ninja" selected>Ninja</option>
                    <option value="Abe">Abe</option>
                    <option value="Clown">Clown</option>
                    <option value="Dummy">Dummy</option>
                </select>
            </div>
        </div>
        <div class="control-panel">
            <div class="siteswap-group">
                <input type="text" placeholder="e.g. 531" class="siteswapinput" />
                <div id="correctedNotationMsg" style="margin-top:8px;margin-bottom:8px;font-size:12px;color:#0b2135;display:none;"></div>
                
                <button id="RandomButton" class="RandomButton">Random</button>
                <div class="speed-group" aria-label="max throw control">
                    <div class="label-value-row">
                        <label for="randMaxThrow">Max Random Throw</label>
                        <div class="speed-value" id="randMaxThrowValue">9</div>
                    </div>
                    <input id="randMaxThrow" class="speed-slider" type="range" min="4" max="9" step="1" value="9" />
                </div>
                <div class="speed-group" aria-label="speed control">
                    <div class="label-value-row">
                        <label for="speed">Speed</label>
                        <div class="speed-value" id="speedValue">1.00×</div>
                    </div>
                    <input id="speed" class="speed-slider" type="range" min="0.2" max="2" step="0.1" value="1" />
                </div>
                <div class="speed-group" aria-label="trail length control">
                    <div class="label-value-row">
                        <label for="trailLengthSlider">Trail Length</label>
                        <div class="speed-value" id="trailLengthValue">250</div>
                    </div>
                    <input id="trailLengthSlider" class="speed-slider" type="range" min="50" max="1500" step="50" value="250" />
                </div>
            </div>
            <div class="rounded-box">
              <p>Ball Settings</p>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Color</th><th>Trail</th><th>Show</th></tr>
                        </thead>
                        <tbody id="ballSettingsTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="rounded-box">
              <p>Scene Settings</p>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Setting</th><th>Show</th></tr>
                        </thead>
                        <tbody id="sceneSettingsTableBody">
                            <tr>
                                <td>Trajectories</td>
                                <td><input type="checkbox" id="showTrajectoriesCheckbox" /></td>
                            </tr>
                            <tr>
                                <td>Tent</td>
                                <td><input type="checkbox" id="showTentCheckbox" checked /></td>
                            </tr>
                            <tr>
                                <td>Debug Mode</td>
                                <td><input type="checkbox" id="debugModeCheckbox" /></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <button class="ResetBtn">Reset</button>
            <button class="SaveBtn">Save</button>
        </div>
    </div>
    <script type="module" src="./main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
          const animPanel = document.querySelector('.animation-panel');
          const rightPanel = document.querySelector('.control-panel');
          if (!animPanel) return;

          if (rightPanel) rightPanel.setAttribute('aria-hidden', 'true');
          const rightBtn = document.createElement('button');
          rightBtn.id = 'right-drawer-btn';
          rightBtn.title = 'Settings';
          rightBtn.textContent = '⚙';
          animPanel.appendChild(rightBtn);

          const toggle = (el, force) => {
            if (!el) return;
            const willOpen = force === true ? true : (force === false ? false : !el.classList.contains('open'));
            el.classList.toggle('open', willOpen);
            el.setAttribute('aria-hidden', willOpen ? 'false' : 'true');
          };

          if (rightBtn && rightPanel) rightBtn.addEventListener('click', () => toggle(rightPanel));
        });
        const speedEl = document.getElementById('speed');
        const speedValueEl = document.getElementById('speedValue');
        if (speedEl && speedValueEl) {
            const update = () => speedValueEl.textContent = Number(speedEl.value).toFixed(1) + '×';
            speedEl.addEventListener('input', update);
            update();
        }

        document.addEventListener('fullscreenchange', () => {
          const panel = document.querySelector('.animation-panel');
          const canvas = document.getElementById('threejs-canvas');
          const renderer = window.renderer;
          const camera = window.camera;
          const controls = window.controls;
          if (!panel || !canvas || !renderer || !camera) return;

          const resizeOnce = () => {
            let w = panel.clientWidth || canvas.clientWidth || 1;
            let h = panel.clientHeight || canvas.clientHeight || 1;
            if (w < 1 || h < 1) { w = 1; h = 1; }

            try {
              renderer.setSize(w, h, false);
              camera.aspect = w / Math.max(1, h);
              camera.updateProjectionMatrix();
              if (controls) controls.update();
            } catch (e) {
              console.warn('Resize after fullscreen failed:', e);
            }
          };

          resizeOnce();
          requestAnimationFrame(resizeOnce);
        });

        window.addEventListener('resize', () => {
          const panel = document.querySelector('.animation-panel');
          const canvas = document.getElementById('threejs-canvas');
          const renderer = window.renderer;
          const camera = window.camera;
          const controls = window.controls;
          if (!panel || !canvas || !renderer || !camera) return;
          const w = Math.max(1, panel.clientWidth || canvas.clientWidth || 1);
          const h = Math.max(1, panel.clientHeight || canvas.clientHeight || 1);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h, false);
          if (controls) controls.update();
        });
    </script>
    
  </body>
</html>
